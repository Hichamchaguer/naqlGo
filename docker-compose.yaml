version: '3.8'

services:

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - net
    depends_on:
      - backend
    restart: unless-stopped


  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    networks:
      - net
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    restart: always
    
  mongoDB:
    image: mongo:latest
    container_name: mongoDB
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=hicham
      - MONGO_INITDB_ROOT_PASSWORD=123
      - MONGO_INITDB_DATABASE=naqlgo_server
      - MONGO_INITDB_PASSWORD=123
    networks:
      - net
    restart: unless-stopped
    
  backend:
    build: ./backend
    ports:
      - "3002:3002"
    networks:
      - net
    volumes:
      - ./backend:/app
      - ./backend/node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=mongoDB
      - DB_PORT=27017
      - DB_USER=hicham
      - DB_PASSWORD=123
      - DB_NAME=naqlgo_server
    depends_on:
      - mongoDB
    restart: always


volumes:
  frontend-node-modules:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      device: /Users/hchaguer/data/mongodb_data
      o: bind

networks:
  net:
    name: naqlgo_network