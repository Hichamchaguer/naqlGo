server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;
    
    # Add these headers for better debugging
    add_header X-Nginx-Server "development" always;
    add_header X-Backend-Server "backend:3002" always;
    
    # SSL Configuration
    # ssl_certificate /etc/nginx/ssl/dev.nqlgo.ma.crt;
    # ssl_certificate_key /etc/nginx/ssl/dev.nqlgo.ma.key;

    # Root location for health checks
    location / {
        return 200 "Nginx is working!";
        add_header Content-Type text/plain;
    }
    
    # API proxy configuration
    location /api/ {
        # Remove trailing slash and add it back to avoid double slashes
        proxy_pass http://backend:3002/api/;
        
        # Essential proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Connection headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # # CORS headers - Fixed and comprehensive
        # add_header 'Access-Control-Allow-Origin' '*' always;
        # add_header 'Access-Control-Allow-Credentials' 'true' always;
        # add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        # add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Accept-Encoding,Accept-Language' always;
        # add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        
        # # Handle preflight requests properly
        # if ($request_method = 'OPTIONS') {
        #     return 204;
        # }
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;
}